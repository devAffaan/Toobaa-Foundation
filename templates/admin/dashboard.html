<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tooba Foundation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_dashboard.css') }}">
</head>
<body>

<div class="admin-navbar">
    <h1>Tooba Foundation Admin</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="dashboard-container">

    <div class="stats-bar">
        <h3>Total Books: <span id="totalBooks">0</span></h3>
        <button class="add-btn"
                data-bs-toggle="modal"
                data-bs-target="#addBookModal">
            + Add New Book
        </button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cover</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="booksTable">
            </tbody>
        </table>
    </div>

</div>

<div class="modal fade" id="addBookModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add New Book</h5>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body">

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" id="title"
                           class="form-control"
                           placeholder="Book title">
                </div>

                <div class="mb-3">
                    <label class="form-label">Author</label>
                    <input type="text" id="author"
                           class="form-control"
                           placeholder="Author name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <input type="text" id="category"
                           class="form-control"
                           placeholder="e.g. Pothwari, History">
                </div>

                <div class="mb-3">
                    <label class="form-label">Cover Image Path</label>
                    <input type="text" id="cover_image"
                           class="form-control"
                           placeholder="images/book.png">
                </div>

                <div class="mb-3">
                    <label class="form-label">PDF Path</label>
                    <input type="text" id="pdf_path"
                           class="form-control"
                           placeholder="pdfs/book.pdf">
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea id="description"
                              class="form-control"
                              rows="3"
                              placeholder="Short description">
                    </textarea>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancel
                </button>
                <button class="btn btn-success"
                        onclick="addBook()">
                    Add Book
                </button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/admin_dashboard.js') }}"></script>

</body>
</html>
